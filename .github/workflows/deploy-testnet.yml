name: Deploy Testnet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli

      - name: Build contract
        run: stellar contract build

      - name: Configure deployer identity
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: stellar keys add deployer --secret-key "$DEPLOYER_SECRET_KEY"

      - name: Upload contract wasm
        id: upload
        run: |
          WASM_HASH=$(stellar contract upload \
            --wasm target/wasm32v1-none/release/will.wasm \
            --source deployer \
            --network testnet)
          echo "wasm_hash=$WASM_HASH" >> "$GITHUB_OUTPUT"

      - name: Deploy contract
        id: deploy
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm-hash ${{ steps.upload.outputs.wasm_hash }} \
            --source deployer \
            --network testnet)
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"

      - name: Record deployment
        run: |
          cat <<EOF > deployments/testnet.json
          {
            "WillContract": "${{ steps.deploy.outputs.contract_id }}",
            "network": "testnet",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit deployment record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/testnet.json
          git diff --staged --quiet || git commit -m "chore: record testnet deployment"
          git push
